version: 1.3.11
cache: true

interface:
  agents:
    use: true
    create: true
    share: false
    public: false
  mcpServers:
    use: true
    create: true
    share: false
    public: false

mcpSettings:
  allowedAddresses:
    - "127.0.0.1:8001"

mcpServers:
  juristai-django:
    type: streamable-http
    url: http://127.0.0.1:8001/mcp
    timeout: 60000
