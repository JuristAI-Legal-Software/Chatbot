name: Push LibreChat to AWS ECR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "730335261767"
  ECR_REPOSITORY: librechat

jobs:
  build-and-push-ecr:
    name: Build and push AWS ECR image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          docker build --no-cache --pull \
            --build-arg NODE_MAX_OLD_SPACE_SIZE=8192 \
            --build-arg NPM_CI_TIMEOUT_SECONDS=2400 \
            --build-arg NPM_CI_ATTEMPTS=3 \
            -t "$IMAGE_URI:${GITHUB_SHA}" \
            -t "$IMAGE_URI:latest" \
            .

      - name: Push Docker image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          docker push "$IMAGE_URI:${GITHUB_SHA}"
          docker push "$IMAGE_URI:latest"

      - name: Print pushed image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          echo "Pushed $IMAGE_URI:${GITHUB_SHA}"
          echo "Pushed $IMAGE_URI:latest"