name: Push LibreChat to AWS ECR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Without this, every push starts a fully independent build+deploy run, and
# ECS deploys from stacked pushes race each other for the same service -
# observed directly during the 2026-07-08 crash-loop fix chain, where a
# build that succeeded had its ECS deploy step preempted (and reported
# failed) by a newer push's deploy landing first. Only the latest push's
# result matters for `main`, so cancel anything superseded by a newer one.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "730335261767"
  ECR_REPOSITORY: librechat
  MCP_ECR_REPOSITORY: juristai-mcp-server

jobs:
  build-and-push-ecr:
    name: Build and push AWS ECR image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          docker build --no-cache --pull \
            --build-arg NODE_MAX_OLD_SPACE_SIZE=8192 \
            --build-arg NPM_CI_TIMEOUT_SECONDS=2400 \
            --build-arg NPM_CI_ATTEMPTS=3 \
            -t "$IMAGE_URI:$IMAGE_TAG" \
            .

      - name: Push Docker image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          docker push "$IMAGE_URI:$IMAGE_TAG"

      - name: Print pushed image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          echo "Pushed $IMAGE_URI:$IMAGE_TAG"

  # Builds the juristai-django MCP server sidecar (vendored copy of
  # django-hub/mcp_server - that repo has no AWS credentials of its own, see
  # #CHAT-TOOLS-MCP-NOT-DEPLOYED, so this repo's existing ECR/ECS access
  # builds+deploys it instead). Runs as a second container in the SAME
  # librechat-task (awsvpc networking), reachable at 127.0.0.1:8001 per
  # librechat.yaml's mcpServers.juristai-django.url.
  build-and-push-mcp-server-ecr:
    name: Build and push MCP server AWS ECR image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$MCP_ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$MCP_ECR_REPOSITORY"

      - name: Build Docker image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${MCP_ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          docker build --no-cache --pull \
            -f mcp_server/Dockerfile \
            -t "$IMAGE_URI:$IMAGE_TAG" \
            .

      - name: Push Docker image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${MCP_ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          docker push "$IMAGE_URI:$IMAGE_TAG"

      - name: Print pushed image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${MCP_ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          echo "Pushed $IMAGE_URI:$IMAGE_TAG"

  deploy-ecs:
    name: Deploy image to ECS
    needs: [build-and-push-ecr, build-and-push-mcp-server-ecr]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      ECS_CLUSTER: juristai-librechat-ecs-cluster
      ECS_SERVICE: librechat-service
      ECS_TASK_FAMILY: librechat-task
      MCP_CONTAINER_NAME: mcp-server-container

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register new task definition revision with the pushed images
        id: register
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          NEW_IMAGE="$IMAGE_URI:$IMAGE_TAG"

          MCP_IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${MCP_ECR_REPOSITORY}"
          NEW_MCP_IMAGE="$MCP_IMAGE_URI:$IMAGE_TAG"
          echo "Deploying image: $NEW_IMAGE"
          echo "Deploying MCP server sidecar image: $NEW_MCP_IMAGE"

          # Pull the live task definition so all env vars / secrets / roles are preserved,
          # swap only the librechat container image, add/update the MCP server sidecar
          # container, and re-register a new revision.
          aws ecs describe-task-definition --task-definition "$ECS_TASK_FAMILY" \
            --query 'taskDefinition' --output json > td.json

          python3 - "$NEW_IMAGE" "$IMAGE_URI" "$NEW_MCP_IMAGE" "$MCP_CONTAINER_NAME" <<'PY'
          import json, sys
          new_image, repo, new_mcp_image, mcp_container_name = sys.argv[1:5]
          td = json.load(open("td.json"))
          containers = td["containerDefinitions"]
          for c in containers:
              if c["image"].rsplit(":", 1)[0] == repo:
                  c["image"] = new_image

          mcp_container = next((c for c in containers if c["name"] == mcp_container_name), None)
          if mcp_container is None:
              borrowed_log_config = next(
                  (c.get("logConfiguration") for c in containers if c.get("logConfiguration")),
                  None,
              )
              log_config = json.loads(json.dumps(borrowed_log_config)) if borrowed_log_config else None
              if log_config and log_config.get("options", {}).get("awslogs-stream-prefix"):
                  log_config["options"]["awslogs-stream-prefix"] = mcp_container_name
              mcp_container = {
                  "name": mcp_container_name,
                  "essential": True,
                  "portMappings": [
                      {"containerPort": 8001, "hostPort": 8001, "protocol": "tcp"},
                  ],
                  "logConfiguration": log_config,
              }
              containers.append(mcp_container)
          mcp_container["image"] = new_mcp_image
          mcp_container["memory"] = 256

          # Bump task-level resources so the new sidecar doesn't shrink librechat's
          # existing (unbounded, task-ceiling-shared) headroom.
          if int(td.get("cpu", 0) or 0) < 1024:
              td["cpu"] = "1024"
          if int(td.get("memory", 0) or 0) < 2048:
              td["memory"] = "2048"

          # register-task-definition only accepts a subset of the describe output.
          allowed = {
              "family", "taskRoleArn", "executionRoleArn", "networkMode",
              "containerDefinitions", "volumes", "placementConstraints",
              "requiresCompatibilities", "cpu", "memory", "tags", "pidMode",
              "ipcMode", "proxyConfiguration", "inferenceAccelerators",
              "ephemeralStorage", "runtimePlatform",
          }
          clean = {k: v for k, v in td.items() if k in allowed}
          json.dump(clean, open("td_new.json", "w"))
          PY

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://td_new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered $NEW_TD_ARN"
          echo "task_def_arn=$NEW_TD_ARN" >> "$GITHUB_OUTPUT"

      - name: Update service and wait for stability
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register.outputs.task_def_arn }}" \
            --query 'service.{status:status,taskDefinition:taskDefinition}' --output json
          echo "Waiting for service to reach steady state..."
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
          echo "Deploy complete and service is stable."